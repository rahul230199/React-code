<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AXO Networks — Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/favicon.ico" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/admin-dashbaord/admin-layout.css" />
  <link rel="stylesheet" href="./styles/admin-dashbaord/admin-dashboard.css" />
  <link rel="stylesheet" href="./styles/admin-dashbaord/admin-orders.css" />
</head>

<body>

  <div class="layout">

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-brand">
        <div class="brand-logo">A</div>
        <span>AXO Admin</span>

        <!-- Desktop Collapse Only -->
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Collapse Sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">

        <button data-view="dashboard" class="nav-item active" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          <span>Dashboard</span>
        </button>

        <button data-view="network" class="nav-item" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19 12h3M2 12h3M12 2v3M12 19v3"></path>
          </svg>
          <span>Network</span>
        </button>

        <button data-view="rfq" class="nav-item" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
          </svg>
          <span>RFQs</span>
        </button>

        <button data-view="orders" class="nav-item" type="button">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 6h15l-1.5 9h-13z"></path>
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="18" cy="21" r="1"></circle>
  </svg>
  <span>Orders</span>
</button>

        <button data-view="users" class="nav-item" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-3-3.87"></path>
            <circle cx="9" cy="7" r="4"></circle>
          </svg>
          <span>Users</span>
        </button>

        <button data-view="audit" class="nav-item" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          <span>Audit Logs</span>
        </button>

        <button data-view="system" class="nav-item" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="8"></rect>
            <rect x="2" y="13" width="20" height="8"></rect>
          </svg>
          <span>System</span>
        </button>

      </nav>
    </aside>

    <!-- ================= MAIN ================= -->
    <div class="main">

      <header class="topbar">

        <div class="topbar-left">

          <!-- MOBILE HAMBURGER -->
          <button class="hamburger-menu" id="hamburgerBtn" type="button" aria-label="Open Menu">
            <svg viewBox="0 0 24 24" width="22" height="22"
              fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>

          <h3 id="pageTitle">Dashboard</h3>
        </div>

        <div class="topbar-right">
          <div class="user-profile">
            <div class="avatar">A</div>
            <div>
              <span id="adminName">Admin</span>
              <small id="adminRole">Administrator</small>
            </div>
          </div>
        </div>

          <button id="logoutBtn" class="logout-btn" type="button">
    <svg viewBox="0 0 24 24" width="18" height="18"
      fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
      <polyline points="16 17 21 12 16 7"></polyline>
      <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
    <span>Logout</span>
  </button>

      </header>

      <main class="content" id="contentArea"></main>

    </div>

  </div>

  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script type="module" src="/js/modules/admin/admin-dashboard.page.js"></script>
  <script src="/socket.io/socket.io.js"></script>

</body>
</html>
